<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>冰风空调 · 夏日冰爽特惠</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; }
  body {
    background: linear-gradient(135deg, #0D2B3E 0%, #1E5A8E 50%, #0D2B3E 100%);
    display: flex; align-items: center; justify-content: center;
    user-select: none;
  }

  /* ========== 16:9 横屏画框 (720×405) — 匹配三联图整体比例 ========== */
  .phone {
    position: relative;
    width: 720px;
    height: 405px;
    border-radius: 24px;
    box-shadow: 0 16px 48px rgba(30,136,229,0.4), 0 0 0 6px rgba(240,248,255,0.6);
    overflow: hidden;
    cursor: pointer;
    background: linear-gradient(180deg, #B3E5FC 0%, #4FC3F7 100%);
  }

  /* Layer 1: 9:16 背景图居中（左右填绿色 #02F805 = 三联图 cut 板色） */
  .bg {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 405px;     /* 9:16 横宽 = 405×9/16 = 228 → 用高度反推 405*9/16=228，或宽=405*9/16=228，高=405。我们用 9:16 比例 */
    height: 720px;    /* 不，重新算：用 canvas 高 405，9:16 比例，宽=405*9/16=228 */
    transform: translate(-50%, -50%);
    object-fit: cover;
    z-index: 1;
    /* 改为 correct 9:16 比例 */
  }
  /* 重写：9:16 背景图按 9:16 比例铺满高度 405，宽 = 405*9/16 ≈ 228 */
  .bg {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 228px;
    height: 405px;
    transform: translate(-50%, -50%);
    object-fit: cover;
    z-index: 1;
  }

  /* ========== 5 张 sprite 卡（共用基础样式） ========== */
  .card {
    position: absolute;
    width: 60px;
    height: 80px;
    object-fit: contain;
    transform-origin: center center;
    pointer-events: none;
    filter: drop-shadow(0 4px 8px rgba(30,136,229,0.35));
    will-change: left, top, transform;
  }
  .card-rare {
    filter: drop-shadow(0 0 8px rgba(244,201,93,0.6)) drop-shadow(0 4px 8px rgba(30,136,229,0.35));
  }

  /* Arc 默认状态（3 等级缩放） */
  .card.tier-outer  { transform: translate(-50%, -50%) scale(0.86); z-index: 3; }
  .card.tier-inner  { transform: translate(-50%, -50%) scale(1.00); z-index: 4; }
  .card.tier-center { transform: translate(-50%, -50%) scale(1.18); z-index: 5; }

  /* === 拉齐到滚动轨道 ===
     关键修改：snap-to 后 5 张卡仍在原弧形 Y 附近（约 75%）形成水平轨道
     不再拉到画面中央 Y=50%（否则挡住 Q 版空调） */
  .card.snapping {
    transition: left 0.4s cubic-bezier(0.33, 1, 0.68, 1),
                top  0.4s cubic-bezier(0.33, 1, 0.68, 1),
                transform 0.4s cubic-bezier(0.33, 1, 0.68, 1);
    transform: translate(-50%, -50%) scale(1.0) !important;
    z-index: 4 !important;
  }

  /* === 中奖揭示 === */
  @keyframes revealPop {
    0%   { transform: translate(-50%, -50%) scale(1.0); }
    100% { transform: translate(-50%, -50%) scale(1.15); }
  }
  @keyframes revealSway1 {
    0%   { transform: translate(-50%, -50%) scale(1.15) rotate(0deg); }
    100% { transform: translate(-50%, -50%) scale(1.15) rotate(-4deg); }
  }
  @keyframes revealSway2 {
    0%   { transform: translate(-50%, -50%) scale(1.15) rotate(-4deg); }
    100% { transform: translate(-50%, -50%) scale(1.15) rotate(3deg); }
  }
  @keyframes revealSway3 {
    0%   { transform: translate(-50%, -50%) scale(1.15) rotate(3deg); }
    100% { transform: translate(-50%, -50%) scale(1.15) rotate(0deg); }
  }
  @keyframes revealSettle {
    0%   { transform: translate(-50%, -50%) scale(1.15); }
    100% { transform: translate(-50%, -50%) scale(1.0); }
  }
  .card.revealing { z-index: 6 !important; }
  .card.revealing-pop    { animation: revealPop 0.16s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
  .card.revealing-sway-1 { animation: revealSway1 0.08s ease-in forwards; }
  .card.revealing-sway-2 { animation: revealSway2 0.08s ease-in forwards; }
  .card.revealing-sway-3 { animation: revealSway3 0.08s ease-in forwards; }
  .card.revealing-settle { animation: revealSettle 0.18s cubic-bezier(0.55, 0, 0.55, 1) forwards; }

  /* 抽奖按钮 — 放在画框最底部居中 */
  .draw-btn {
    position: absolute;
    left: 50%;
    bottom: 2%;
    transform: translateX(-50%);
    z-index: 20;
    padding: 8px 28px;
    background: linear-gradient(180deg, #F4C95D 0%, #1E88E5 100%);
    color: #F0F8FF;
    border: 2px solid #F0F8FF;
    border-radius: 24px;
    font-size: 14px;
    font-weight: 900;
    letter-spacing: 2px;
    white-space: nowrap;
    box-shadow: 0 6px 20px rgba(30,136,229,0.5), inset 0 1px 0 rgba(255,255,255,0.3);
    cursor: pointer;
    pointer-events: none;
    transition: opacity 0.3s, transform 0.3s, box-shadow 0.3s;
    animation: btnPulse 2s ease-in-out infinite;
  }
  @keyframes btnPulse {
    0%, 100% { box-shadow: 0 6px 20px rgba(30,136,229,0.5), inset 0 1px 0 rgba(255,255,255,0.3); }
    50%      { box-shadow: 0 8px 28px rgba(244,201,93,0.7), 0 0 16px rgba(244,201,93,0.4), inset 0 1px 0 rgba(255,255,255,0.3); }
  }
  .draw-btn.hidden {
    opacity: 0;
    transform: translateX(-50%) translateY(20px);
    pointer-events: none;
  }

  /* === 老虎机 viewport ===
     关键修改：跟随新 TRACK 位置，Y ≈ 70%（画面下半，不在中央），高度 26% */
  .reel-viewport {
    position: absolute;
    top: 70%; left: 0; right: 0;
    height: 26%;
    overflow: hidden;
    z-index: 10;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .reel-viewport.active { opacity: 1; }
  .reel-viewport::after {
    content: ""; position: absolute;
    top: 0; bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 2px;
    background: #F4C95D;
    box-shadow: 0 0 8px #F4C95D;
    pointer-events: none;
    z-index: 10;
  }
  .reel {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) translateX(0);
    display: flex;
    align-items: center;
    height: 100%;
    will-change: transform;
  }
  .reel .card {
    position: relative;
    left: auto; top: auto;
    width: 60px;
    height: 80px;
    flex-shrink: 0;
    margin: 0 3px;
    transform: scale(1.0);
  }

  /* === 中奖弹窗 === */
  .result-popup {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }
  .result-popup.show { display: flex; animation: fadeIn 0.4s; }
  .result-card {
    width: 220px;
    background: #F0F8FF;
    border: 3px solid #F4C95D;
    border-radius: 16px;
    padding: 20px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(244,201,93,0.6);
    animation: pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
  }
  .result-card .close {
    position: absolute; top: 6px; right: 10px;
    background: none; border: none;
    font-size: 20px; color: #1E88E5;
    cursor: pointer; opacity: 0.5;
  }
  .result-title { font-size: 13px; color: #1E88E5; opacity: 0.7; margin-bottom: 6px; }
  .result-card-img { width: 60px; height: 80px; margin: 6px auto; object-fit: contain; filter: drop-shadow(0 4px 8px rgba(30,136,229,0.3)); }
  .result-name { font-size: 16px; font-weight: 800; color: #1E88E5; margin-top: 6px; }
  .result-discount { font-size: 24px; font-weight: 800; color: #F4C95D; margin: 2px 0; }
  .result-tip { font-size: 11px; color: #1E88E5; opacity: 0.6; margin-top: 6px; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes pop {
    0% { transform: scale(0.5); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
</style>
</head>
<body>
  <div class="phone" id="phone">
    <!-- Layer 1: 9:16 背景图（中 panel，9:16 contain 居中） -->
    <img class="bg" src="background-hires.png" alt="" />

    <!-- Layer 2: 5 张 sprite 卡（默认弧形 → snap-to → scroll） -->
    <div id="cardsArc"></div>

    <!-- Layer 3: 老虎机 viewport（snap-to 后出现，Y=62% 不在中央） -->
    <div class="reel-viewport" id="reelViewport">
      <div class="reel" id="reel"></div>
    </div>

    <!-- 抽奖按钮 — 画框底部居中 -->
    <button class="draw-btn" id="drawBtn">立即抽奖</button>

    <!-- 中奖弹窗 -->
    <div class="result-popup" id="popup">
      <div class="result-card">
        <button class="close" id="closePopup">×</button>
        <div class="result-title">恭喜抽中</div>
        <img class="result-card-img" id="popupCard" src="" alt="" />
        <div class="result-name" id="popupName">微凉体验券</div>
        <div class="result-discount" id="popupDiscount">9折</div>
        <div class="result-tip">到店出示即可享受</div>
      </div>
    </div>
  </div>

<script type="module">
import {
  COUPONS, ARC_ORDER, ARC_POSITIONS, TRACK_POSITIONS,
  weightedPick, PityCounter, SlotLayout, ANIM, REEL_STEP, REEL_CARD_WIDTH, REEL_CARD_MARGIN,
} from './game.js';

const phone = document.getElementById('phone');
const cardsArc = document.getElementById('cardsArc');
const drawBtn = document.getElementById('drawBtn');
const reelViewport = document.getElementById('reelViewport');
const reel = document.getElementById('reel');
const popup = document.getElementById('popup');
const popupCard = document.getElementById('popupCard');
const popupName = document.getElementById('popupName');
const popupDiscount = document.getElementById('popupDiscount');
const closePopup = document.getElementById('closePopup');

const pity = new PityCounter();
let isSpinning = false;

// sprite 文件映射：C1→card-1, C3→card-2, C5→card-3, C4→card-4, C2→card-5
const SPRITE_FILE = { C1: 1, C3: 2, C5: 3, C4: 4, C2: 5 };

// ====== 创建 sprite 卡 DOM ======
function createCardEl(coupon) {
  const img = document.createElement('img');
  img.className = `card ${coupon.rare ? 'card-rare' : ''}`;
  img.src = `cards/card-${SPRITE_FILE[coupon.id]}.png`;
  img.alt = `${coupon.name} ${coupon.discount}`;
  img.dataset.id = coupon.id;
  return img;
}

// ====== 渲染 default 状态的 5 张卡（弧形布局） ======
function renderArcCards() {
  cardsArc.innerHTML = '';
  ARC_ORDER.forEach((id, idx) => {
    const coupon = COUPONS.find(c => c.id === id);
    const posKey = `P${idx + 1}`;
    const pos = ARC_POSITIONS[posKey];
    const el = createCardEl(coupon);
    el.classList.add(`tier-${pos.tier}`);
    el.style.left = `${pos.x}%`;
    el.style.top = `${pos.y}%`;
    el.dataset.posKey = posKey;
    cardsArc.appendChild(el);
  });
}
renderArcCards();

// ====== 响应式缩放：把 720×405 canvas 缩到 viewport 内（手机竖屏不被截切） ======
function fitCanvas() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const margin = 16;  // 留 16px 边距
  const scale = Math.min((vw - margin*2) / 720, (vh - margin*2) / 405);
  phone.style.transformOrigin = 'center center';
  phone.style.transform = `scale(${scale})`;
}
fitCanvas();
window.addEventListener('resize', fitCanvas);
window.addEventListener('orientationchange', fitCanvas);

// ====== 渲染老虎机 reel ======
function renderReel(winnerId) {
  reel.innerHTML = '';
  const layout = SlotLayout.build(winnerId);
  layout.forEach((card) => {
    const coupon = COUPONS.find(c => c.id === card.id);
    const el = createCardEl(coupon);
    reel.appendChild(el);
  });
}

// ====== snap-to 阶段：5 张卡拉到水平滚动轨道（保持在原 Y 附近，不拉到画面中央） ======
function snapToTrack() {
  const cards = cardsArc.querySelectorAll('.card');
  cards.forEach((el) => {
    const posKey = el.dataset.posKey;
    const pos = TRACK_POSITIONS[posKey];
    el.classList.add('snapping');
    el.style.left = `${pos.x}%`;
    el.style.top = `${pos.y}%`;
  });
}

// ====== 重置回 arc 状态（弹窗关闭时调用，无 transition） ======
function resetToArc() {
  const cards = cardsArc.querySelectorAll('.card');
  cards.forEach((el) => {
    // 1. 关闭所有 transition，让位置立即回 arc
    el.style.transition = 'none';
    // 2. 清掉所有动画相关 class（snapping、revealing、revealing-*）
    el.classList.remove(
      'snapping', 'revealing',
      'revealing-pop', 'revealing-sway-1', 'revealing-sway-2', 'revealing-sway-3', 'revealing-settle'
    );
    // 3. 清掉 inline opacity（snap 阶段可能设了 opacity=0）
    el.style.opacity = '';
    // 4. 重置 inline transform（防止 reveal-settle 残留的 scale/rotate）
    el.style.transform = '';
    // 5. 把位置设回 ARC_POSITIONS（arc 状态由 tier-* CSS class 控制 transform）
    const posKey = el.dataset.posKey;
    const pos = ARC_POSITIONS[posKey];
    el.style.left = `${pos.x}%`;
    el.style.top = `${pos.y}%`;
  });
  // 强制 reflow 让浏览器提交样式变更
  void phone.offsetWidth;
  // 恢复 transition（让后续 snap-to 还有动画）
  cards.forEach((el) => { el.style.transition = ''; });
  // 重置 reel
  reel.style.transition = 'none';
  reel.style.transform = 'translate(-50%, -50%) translateX(0)';
  reelViewport.classList.remove('active');
  reel.innerHTML = '';
  drawBtn.classList.remove('hidden');
}

// ====== 中奖揭示动画 ======
function revealWinner(cardEl) {
  // 4 段动画：pop → sway1 → sway2 → sway3 → settle
  const D = { pop: 160, sway: 80, settle: 180 };
  cardEl.classList.add('revealing', 'revealing-pop');
  setTimeout(() => {
    cardEl.classList.remove('revealing-pop');
    cardEl.classList.add('revealing-sway-1');
    setTimeout(() => {
      cardEl.classList.remove('revealing-sway-1');
      cardEl.classList.add('revealing-sway-2');
      setTimeout(() => {
        cardEl.classList.remove('revealing-sway-2');
        cardEl.classList.add('revealing-sway-3');
        setTimeout(() => {
          cardEl.classList.remove('revealing-sway-3');
          cardEl.classList.add('revealing-settle');
          setTimeout(() => {
            cardEl.classList.remove('revealing-settle');
          }, D.settle);
        }, D.sway);
      }, D.sway);
    }, D.sway);
  }, D.pop);
}

// ====== 点击触发抽奖 ======
phone.addEventListener('click', () => {
  if (isSpinning) return;
  isSpinning = true;
  drawBtn.classList.add('hidden');

  // 1. 加权随机选
  const expected = weightedPick();
  const result = pity.apply(expected);

  // 2. snap-to 阶段：5 张卡拉到水平滚动轨道（400ms）
  snapToTrack();

  // 3. snap-to 完成后，停顿 200ms，再切到 reel
  setTimeout(() => {
    // 隐藏 arc cards
    cardsArc.querySelectorAll('.card').forEach((c) => {
      c.style.transition = 'opacity 0.3s';
      c.style.opacity = '0';
    });

    // 构建 reel
    setTimeout(() => {
      renderReel(result.id);
      reelViewport.classList.add('active');

      // 4. scroll 阶段：reel translateX
      const offset = SlotLayout.finalOffset(REEL_CARD_WIDTH, REEL_CARD_MARGIN, 35, 40);
      reel.style.transition = `transform ${ANIM.SPIN_DURATION}ms ${ANIM.SPIN_EASING}`;
      void reel.offsetWidth;
      reel.style.transform = `translate(-50%, -50%) translateX(${offset}px)`;

      // 5. scroll 完成后：定位 winner 卡，做 reveal
      setTimeout(() => {
        // winner 卡是 reel 上 index 35 (即 reel 第 36 张)
        const winnerCard = reel.children[35];
        if (winnerCard) {
          revealWinner(winnerCard);
        }
        // reveal 完成后弹窗
        setTimeout(() => {
          showResult(result);
          isSpinning = false;
        }, ANIM.REVEAL_DURATION);
      }, ANIM.SPIN_DURATION);
    }, 300);
  }, ANIM.SNAP_DURATION + ANIM.SNAP_HOLD);
});

function showResult(coupon) {
  popupCard.src = `cards/card-${SPRITE_FILE[coupon.id]}.png`;
  popupName.textContent = coupon.name;
  popupDiscount.textContent = coupon.discount;
  popup.classList.add('show');
}

closePopup.addEventListener('click', (e) => {
  e.stopPropagation();
  popup.classList.remove('show');
  // 重置：立即回 arc（无 transition），按钮恢复
  setTimeout(() => {
    resetToArc();
  }, 100);
});

// 暴露给测试
window.__game = { COUPONS, weightedPick, PityCounter, SlotLayout, ARC_ORDER };
</script>
</body>
</html>
